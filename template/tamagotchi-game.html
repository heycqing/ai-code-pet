function drawPixelSprite(canvas, grid, scale=4) {
  if (!canvas || !grid) return;
  const W = 16, H = 16;
  canvas.width  = W * scale;
  canvas.height = H * scale;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for (let r=0; r<H; r++) {
    const row = (grid[r]||'').padEnd(W,'_');
    for (let c=0; c<W; c++) {
      const col = PAL[row[c]];
      if (!col) continue;
      ctx.fillStyle = col;
      ctx.fillRect(c*scale, r*scale, scale, scale);
    }
  }
}

// ─────────────────────────────────────────────────────────────────
// SPRITE COMPONENT
// ─────────────────────────────────────────────────────────────────
function PixelSprite({ creature, level, state='idle', scale=4, style={} }) {
  const canvasRef = useRef();
  const grids = creature.id === 'hundun' ? HUNDUN_SPRITES : BAIZE_SPRITES;
  const levelData = grids[Math.min(level, 4)];
  const grid = levelData?.idle || [];

  useEffect(() => {
    if (canvasRef.current) drawPixelSprite(canvasRef.current, grid, scale);
  }, [grid, scale]);

  return (
    <canvas
      ref={canvasRef}
      style={{ imageRendering:'pixelated', ...style }}
    />
  );
}

// Animated sprite with float/bounce/shake
function AnimatedSprite({ creature, level, mood, scale=5 }) {
  const animMap = {
    happy: 'float 1.2s ease-in-out infinite',
    hungry: 'shake 0.5s ease-in-out infinite',
    sick: 'shake 0.8s ease-in-out infinite',
    sleeping: 'none',
    dead: 'none',
    idle: 'float 2.4s ease-in-out infinite',
  };
  return (
    <div style={{ animation: animMap[mood] || animMap.idle, display:'inline-block' }}>
      <PixelSprite creature={creature} level={level} scale={scale} />
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────
// STAT BAR
// ─────────────────────────────────────────────────────────────────
function StatBar({ label, icon, value, max=100, theme, color }) {
  const pct = Math.max(0, Math.min(100, (value/max)*100));
  const fillColor = pct > 60 ? (color||theme.statFill) : pct > 30 ? theme.special : theme.danger;
  return (
    <div style={{ marginBottom:6 }}>
      <div style={{ display:'flex', justifyContent:'space-between', marginBottom:3 }}>
        <span style={{ fontSize:11, color:theme.textMuted, letterSpacing:'0.05em' }}>
          {icon} {label}
        </span>
        <span style={{ fontSize:11, color:theme.textMuted, fontVariantNumeric:'tabular-nums' }}>
          {Math.round(value)}/{max}
        </span>
      </div>
      <div style={{
        height:6, background:theme.statBg, borderRadius:3,
        overflow:'hidden', border:`1px solid ${theme.border}`,
      }}>
        <div style={{
          height:'100%', width:`${pct}%`, background:fillColor,
          borderRadius:3, transition:'width 0.5s ease',
          boxShadow: pct > 60 ? `0 0 6px ${fillColor}60` : 'none',
        }}/>
      </div>
    </div>
  );
}

  { id:'compend',  icon:'📖', label:'图鉴' },
  { id:'settings', icon:'⚙️',  label:'设置' },
];

function NavBar({ screen, setScreen, theme }) {
  return (
    <div style={{
      display:'flex', borderTop:`1px solid ${theme.navBorder}`,
      background:theme.navBg, paddingBottom:4,
    }}>
      {NAV_ITEMS.map(n => {
        const active = screen === n.id;
        return (
          <button key={n.id} onClick={() => setScreen(n.id)} style={{
            flex:1, display:'flex', flexDirection:'column', alignItems:'center',
            gap:2, padding:'8px 0 4px', background:'none', border:'none',
            cursor:'pointer',
          }}>
            <span style={{ fontSize:18, opacity: active ? 1 : 0.45 }}>{n.icon}</span>
            <span style={{
              fontSize:9, letterSpacing:'0.04em',
              color: active ? theme.accent : theme.textDim,
              fontWeight: active ? 600 : 400,
            }}>{n.label}</span>
            {active && <div style={{
              width:20, height:2, background:theme.accent,
              borderRadius:1, marginTop:2,
              boxShadow:`0 0 6px ${theme.accent}`,
            }}/>}
          </button>
        );
      })}
    </div>
  );
}

// SCREEN: MAIN
// ─────────────────────────────────────────────────────────────────
function MainScreen({ pet, theme, onAction }) {
  const creature = CREATURES[pet.creatureId];
  const moodEmoji = { idle:'😌', happy:'😄', hungry:'😤', sick:'🤒', sleeping:'😴', dead:'💀' };
  const timeOfDay = ['清晨','上午','午后','傍晚','深夜'][Math.floor((new Date().getHours()/24)*5)];

  // Floating sparkle particles for happy mood
  const sparkles = pet.mood === 'happy' ? ['✦','✧','✦'] : [];

  return (
    <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
      {/* Top info bar */}
      <div style={{
        display:'flex', justifyContent:'space-between', alignItems:'center',
        padding:'10px 16px 6px', borderBottom:`1px solid ${theme.border}`,
      }}>
        <div>
          <div style={{ fontSize:18, fontWeight:700, color:theme.text, letterSpacing:'0.05em' }}>
            {creature.name}
          </div>
          <div style={{ fontSize:10, color:theme.textMuted, marginTop:1 }}>
            {creature.type} · Lv.{pet.level+1} {creature.levels[pet.level]}
          </div>
        </div>
        <div style={{ textAlign:'right' }}>
          <div style={{ fontSize:22 }}>{moodEmoji[pet.mood]||'😌'}</div>
          <div style={{ fontSize:9, color:theme.textMuted }}>{timeOfDay}</div>
        </div>
      </div>

      {/* Sprite stage */}
      <div style={{
        flex:1, display:'flex', flexDirection:'column',
        alignItems:'center', justifyContent:'center',
        background:`radial-gradient(ellipse at 50% 60%, ${creature.color}18 0%, transparent 70%)`,
        position:'relative', padding:'16px 0',
      }}>
        {/* Sparkles */}
        {sparkles.map((s,i) => (
          <div key={i} style={{
            position:'absolute', fontSize:14, color:theme.accent,
            top:`${25+i*15}%`, left:`${25+i*25}%`,
            animation:`sparkle 1.${i+2}s ease-in-out infinite`,
            animationDelay:`${i*0.4}s`,
          }}>{s}</div>
        ))}

        {/* Shadow */}
        <div style={{
          width:60, height:10, borderRadius:'50%',
          background:`${creature.color}30`,
          filter:'blur(6px)', marginBottom:-8,
          animation: pet.mood!=='sleeping' ? 'pulse 2.4s ease-in-out infinite' : 'none',
        }}/>

        <AnimatedSprite creature={creature} level={pet.level} mood={pet.mood} scale={6} />

        {/* Mood bubble */}
        {pet.mood === 'sleeping' && (
          <div style={{
            position:'absolute', top:'15%', right:'25%',
            fontSize:18, animation:'float 2s ease-in-out infinite',
          }}>💤</div>
        )}
        {pet.mood === 'hungry' && (
          <div style={{
            position:'absolute', top:'15%', right:'22%',
            fontSize:16, animation:'float 1s ease-in-out infinite',
          }}>❓</div>
        )}
      </div>

      {/* Stats panel */}
      <div style={{
        padding:'12px 16px 8px',
        background:theme.bgPanel,
        borderTop:`1px solid ${theme.border}`,
      }}>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'0 16px' }}>
          <StatBar label="饱食度" icon="🍖" value={pet.stats.hunger}   theme={theme} />
          <StatBar label="心情"   icon="💛" value={pet.stats.mood}     theme={theme} color={theme.special} />
          <StatBar label="健康"   icon="💚" value={pet.stats.health}   theme={theme} color={theme.success} />
          <StatBar label="精力"   icon="⚡" value={pet.stats.energy}   theme={theme} />
          <StatBar label="羁绊"   icon="🌸" value={pet.stats.bond}     theme={theme} color={theme.special} />
          <StatBar label="进化"   icon="✨" value={pet.stats.evo}      theme={theme} color={theme.accent} />
        </div>

        {/* Quick actions */}
        <div style={{ display:'flex', gap:8, marginTop:10 }}>
          {[
            { icon:'🍖', label:'喂食', action:'feed' },
            { icon:'🎮', label:'玩耍', action:'play' },
            { icon:'💊', label:'治疗', action:'heal' },
          ].map(btn => (
            <button key={btn.action} onClick={() => onAction(btn.action)} style={{
              flex:1, padding:'8px 0', border:`1px solid ${theme.btnBorder}`,
              background:theme.btnBg, color:theme.btnText, borderRadius:6,
              fontSize:11, cursor:'pointer', letterSpacing:'0.05em',
              display:'flex', flexDirection:'column', alignItems:'center', gap:3,
            }}>
              <span style={{ fontSize:18 }}>{btn.icon}</span>
              <span>{btn.label}</span>
            </button>
          ))}
        </div>
      </div>
    </div>

function EvolveScreen({ pet, theme, onEvolve }) {
  const creature = CREATURES[pet.creatureId];
  const canEvolve = pet.stats.evo >= 100 && pet.level < 4;
  const [evolving, setEvolving] = useState(false);

  const handleEvolve = () => {
    if (!canEvolve) return;
    setEvolving(true);
    setTimeout(() => { onEvolve(); setEvolving(false); }, 2000);
  };

  return (
    <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
      <div style={{ padding:'12px 16px 8px', borderBottom:`1px solid ${theme.border}` }}>
        <div style={{ fontSize:16, color:theme.text, fontWeight:600, letterSpacing:'0.08em' }}>进化</div>
        <div style={{ fontSize:11, color:theme.textMuted, marginTop:2 }}>
          当前：Lv.{pet.level+1} {creature.levels[pet.level]}
        </div>
      </div>

      {/* Evolution path */}
      <div style={{ padding:'16px', overflowY:'auto', flex:1 }}>
        <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
          {creature.levels.map((lv, i) => {
            const unlocked = i <= pet.level;
            const isCurrent = i === pet.level;
            const isNext = i === pet.level + 1;
            return (
              <div key={i} style={{
                display:'flex', alignItems:'center', gap:12,
                padding:'12px 14px',
                border:`1px solid ${isCurrent ? theme.accent : unlocked ? theme.border : theme.textDim}`,
                background: isCurrent ? theme.accentSoft : theme.bgCard,
                borderRadius:8, opacity: unlocked || isNext ? 1 : 0.4,
              }}>
                <div style={{
                  width:48, height:48, borderRadius:6,
                  background:theme.bgPanel, border:`1px solid ${theme.border}`,
                  display:'flex', alignItems:'center', justifyContent:'center',
                  overflow:'hidden',
                }}>
                  <PixelSprite creature={creature} level={i} scale={3} />
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:14, color: isCurrent ? theme.accent : theme.text, fontWeight:600 }}>
                    Lv.{i+1} {lv}
                  </div>
                  {isCurrent && <div style={{ fontSize:10, color:theme.accent, marginTop:2 }}>← 当前形态</div>}
                  {isNext && !canEvolve && (
                    <div style={{ fontSize:10, color:theme.textMuted, marginTop:2 }}>
                      进化进度：{Math.round(pet.stats.evo)}/100
                    </div>
                  )}
                  {isNext && canEvolve && (
                    <div style={{ fontSize:10, color:theme.success, marginTop:2 }}>✦ 可以进化！</div>
                  )}
                  {!unlocked && !isNext && (
                    <div style={{ fontSize:10, color:theme.textDim, marginTop:2 }}>🔒 未解锁</div>
                  )}
                </div>
                {isCurrent && <span style={{ fontSize:20 }}>⭐</span>}
              </div>
            );
          })}
        </div>

        {/* Evolve button */}
        <div style={{ marginTop:20 }}>
          {pet.level >= 4 ? (
            <div style={{
              textAlign:'center', padding:'16px',
              color:theme.accent, fontSize:14, letterSpacing:'0.1em',
              border:`1px solid ${theme.accent}`, borderRadius:8,
              background:theme.accentSoft,
            }}>
              ✦ 已达最终形态 ✦
            </div>
          ) : (
            <button onClick={handleEvolve} disabled={!canEvolve} style={{
              width:'100%', padding:'14px',
              background: canEvolve ? theme.accent : theme.bgCard,
              border:`1px solid ${canEvolve ? theme.accent : theme.border}`,
              color: canEvolve ? '#000' : theme.textDim,
              borderRadius:8, fontSize:14, fontWeight:700,
              letterSpacing:'0.1em', cursor: canEvolve ? 'pointer' : 'not-allowed',
              fontFamily:'inherit',
              animation: canEvolve ? `glow 2s ease-in-out infinite` : 'none',
            }}>
              {evolving ? '进化中...' : canEvolve ? '✦ 立即进化 ✦' : `进化进度不足 (${Math.round(pet.stats.evo)}/100)`}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

// MAIN APP
// ─────────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "ink",
  "creatureId": "hundun",
  "tickSpeed": 8
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [screen, setScreen] = useState('main');
  const theme = THEMES[tweaks.theme] || THEMES.ink;

  const initPet = (id) => ({
    creatureId: id,
    level: 0,
    mood: 'idle',
    coins: 120,
    stats: { hunger:80, mood:70, health:90, energy:75, bond:20, evo:0 },
  });

  const [pet, setPet] = useState(() => initPet(tweaks.creatureId));

  // Sync creature when tweak changes
  useEffect(() => {
    setPet(p => p.creatureId === tweaks.creatureId ? p : initPet(tweaks.creatureId));
  }, [tweaks.creatureId]);

  // Auto-decay tick
  useEffect(() => {
    const id = setInterval(() => {
      setPet(p => {
        const s = { ...p.stats };
        s.hunger  = Math.max(0, s.hunger  - 0.8 * tweaks.tickSpeed/8);
        s.mood    = Math.max(0, s.mood    - 0.4 * tweaks.tickSpeed/8);
        s.energy  = Math.max(0, s.energy  - 0.3 * tweaks.tickSpeed/8);
        const mood =
          s.hunger < 20 ? 'hungry' :
          s.health < 20 ? 'sick'   :
          s.mood   > 75 ? 'happy'  : 'idle';
        return { ...p, stats:s, mood };
      });
    }, 3000);
    return () => clearInterval(id);
  }, [tweaks.tickSpeed]);

  const handleAction = (action) => {
    setPet(p => {
      const s = { ...p.stats };
      if (action === 'feed')  { s.hunger = Math.min(100, s.hunger+20); s.mood = Math.min(100, s.mood+5); }
      if (action === 'play')  { s.mood   = Math.min(100, s.mood+20);   s.energy = Math.max(0, s.energy-10); s.bond = Math.min(100, s.bond+5); }
      if (action === 'heal')  { s.health = Math.min(100, s.health+30); }
      return { ...p, stats:s };
    });
  };

  const handleFeed = (food) => {
    setPet(p => {
      if (p.coins < food.cost) return p;
      const s = { ...p.stats };
      s.hunger = Math.min(100, s.hunger + food.hunger);
      s.mood   = Math.min(100, s.mood   + food.mood);
      s.bond   = Math.min(100, s.bond   + food.bond);
      if (food.health) s.health = Math.min(100, s.health + food.health);
      return { ...p, stats:s, coins: p.coins - food.cost };
    });
  };

  const handleTrain = (t) => {
    setPet(p => {
      const s = { ...p.stats };
      s.energy = Math.max(0, s.energy + t.energy);
      s.evo    = Math.min(100, s.evo + t.evo);
      s.bond   = Math.min(100, s.bond + t.bond);
      return { ...p, stats:s, coins: p.coins + (t.coins||0) };
    });
  };

  const handleEvolve = () => {
    setPet(p => {
      if (p.level >= 4) return p;
      const s = { ...p.stats, evo:0 };
      return { ...p, level: p.level+1, stats:s };
    });
  };

  const handleSwitch = (id) => {
    setTweak('creatureId', id);
    setScreen('main');
  };

  const screens = {
    main:     <MainScreen     pet={pet} theme={theme} onAction={handleAction} />,
    feed:     <FeedScreen     pet={pet} theme={theme} onFeed={handleFeed} />,
    train:    <TrainScreen    pet={pet} theme={theme} onTrain={handleTrain} />,
    evolve:   <EvolveScreen   pet={pet} theme={theme} onEvolve={handleEvolve} />,
    compend:  <CompendiumScreen pet={pet} theme={theme} />,
    settings: <SettingsScreen pet={pet} theme={theme} themeName={tweaks.theme} onTheme={t => setTweak('theme',t)} onSwitch={handleSwitch} />,
  };

  return (
    <>
      <style>{`
        @keyframes glow {
          0%,100% { box-shadow: 0 0 8px ${theme.accent}; }
          50%      { box-shadow: 0 0 22px ${theme.accent}; }
        }
      `}</style>

      {/* Phone shell */}
      <div style={{
        width: 375, height: 812,
        background: theme.bg,
        borderRadius: 40,
        overflow: 'hidden',
        display: 'flex',
        flexDirection: 'column',
        boxShadow: `0 0 0 8px #1a1a22, 0 0 0 10px #0a0a10, 0 40px 80px #00000090`,
        position: 'relative',
      }}>
        {/* Status bar */}
        <div style={{
          height:44, display:'flex', alignItems:'center',
          justifyContent:'space-between', padding:'0 24px',
          background:theme.bg, flexShrink:0,
        }}>
          <span style={{ fontSize:12, color:theme.textMuted, fontWeight:600 }}>
            {new Date().toLocaleTimeString('zh',{hour:'2-digit',minute:'2-digit'})}
          </span>
          <div style={{
            width:120, height:24, background:'#000',
            borderRadius:12, position:'absolute', left:'50%', transform:'translateX(-50%)',
          }}/>
          <div style={{ display:'flex', gap:5, alignItems:'center' }}>
            <span style={{ fontSize:11, color:theme.textMuted }}>💎{pet.coins}</span>
          </div>
        </div>

        {/* Screen content */}
        <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden', animation:'fadeIn 0.2s ease' }}>
          {screens[screen]}
        </div>

        {/* Nav */}
        <NavBar screen={screen} setScreen={setScreen} theme={theme} />

        {/* Home indicator */}
        <div style={{
          height:20, display:'flex', alignItems:'center', justifyContent:'center',
          background:theme.bg,
        }}>
          <div style={{ width:100, height:4, background:theme.border, borderRadius:2 }}/>
        </div>
      </div>

      {/* Tweaks panel */}
      <TweaksPanel>
        <TweakSection title="外观主题">
          <TweakRadio id="theme" label="主题" options={[
            {value:'ink',   label:'水墨'},
            {value:'dark',  label:'暗黑'},
            {value:'rouge', label:'朱砂'},
          ]}/>
        </TweakSection>
        <TweakSection title="神兽">
          <TweakRadio id="creatureId" label="选择" options={[
            {value:'hundun', label:'混沌'},
            {value:'baize',  label:'白泽'},
          ]}/>
        </TweakSection>
        <TweakSection title="游戏速度">
          <TweakSlider id="tickSpeed" label="衰减速度" min={1} max={20} step={1}/>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
